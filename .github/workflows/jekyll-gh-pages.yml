# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Superstore | Analisis Penjualan & Profit</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 30px 20px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .dashboard-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .dashboard-header h1 {
            font-size: 2.2rem;
            color: #1e293b;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .dashboard-header p {
            color: #475569;
            margin-top: 8px;
            font-size: 1rem;
        }

        /* Grid layout */
        .grid-2cols {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            padding: 20px 20px 25px 20px;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0f172a;
            border-left: 5px solid #3b82f6;
            padding-left: 15px;
            margin-bottom: 20px;
        }

        .card-title span {
            font-size: 0.85rem;
            font-weight: normal;
            color: #64748b;
            margin-left: 10px;
        }

        .chart-container {
            position: relative;
            height: 320px;
            width: 100%;
            margin-bottom: 16px;
        }

        .narasi {
            background: #f8fafc;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.9rem;
            color: #1e293b;
            line-height: 1.45;
            border-left: 3px solid #3b82f6;
            margin-top: 12px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: #e6f0ff;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.8rem;
            color: #5b6e8c;
        }

        @media (max-width: 800px) {
            .grid-2cols {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .card-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="dashboard-header">
        <h1>📊 Superstore Dashboard</h1>
        <p>Analisis penjualan, profit, dan performa regional | Data sample 2023–2024</p>
    </div>

    <!-- BARIS 1: DUA GRAFIK (KATEGORI) -- sesuai permintaan: satu judul dengan dua visual -->
    <div class="card" style="margin-bottom: 28px;">
        <div class="card-title">
            📦 Data per Kategori Produk
            <span>Sales vs Profit Margin (%)</span>
        </div>
        <div class="grid-2cols" style="margin-bottom: 0; gap: 20px;">
            <!-- Grafik 1: Sales by Category -->
            <div>
                <div class="chart-container">
                    <canvas id="salesCategoryChart" width="400" height="300" style="max-width:100%; height:auto;"></canvas>
                </div>
                <div class="narasi">
                    <strong>💵 Penjualan per Kategori:</strong> Teknologi memimpin dengan total penjualan $1,08M, disusul Perlengkapan Kantor ($0,97M) dan Furnitur ($0,74M). Kontribusi teknologi didorong oleh produk elektronik dan telepon berharga tinggi.
                </div>
            </div>
            <!-- Grafik 2: Profit Margin by Category -->
            <div>
                <div class="chart-container">
                    <canvas id="profitMarginChart" width="400" height="300" style="max-width:100%; height:auto;"></canvas>
                </div>
                <div class="narasi">
                    <strong>📈 Marjin Keuntungan (%):</strong> Teknologi memberikan marjin tertinggi (21,5%) berkat efisiensi biaya. Furnitur memiliki marjin terendah (9,3%) karena tingginya diskon dan biaya pengiriman. Perlengkapan Kantor di posisi tengah (14,7%).
                </div>
            </div>
        </div>
    </div>

    <!-- BARIS 2: DUA GRAFIK (REGIONAL & PROFIT) -->
    <div class="grid-2cols">
        <!-- Grafik 3: Sales by Region (Pie) -->
        <div class="card">
            <div class="card-title">
                🌎 Distribusi Penjualan per Wilayah
            </div>
            <div class="chart-container">
                <canvas id="regionSalesChart" width="400" height="280" style="max-width:100%; height:auto;"></canvas>
            </div>
            <div class="narasi">
                <strong>🗺️ Pangsa penjualan:</strong> Wilayah Timur menyumbang porsi terbesar (34%), diikuti Barat (29%), Tengah (23%), dan Selatan (14%). Timur unggul karena konsentrasi kota metropolitan & pesanan bernilai tinggi.
            </div>
        </div>

        <!-- Grafik 4: Profit by Region (Bar) -->
        <div class="card">
            <div class="card-title">
                💰 Total Profit per Wilayah
            </div>
            <div class="chart-container">
                <canvas id="regionProfitChart" width="400" height="280" style="max-width:100%; height:auto;"></canvas>
            </div>
            <div class="narasi">
                <strong>🏆 Profit absolut:</strong> Timur memimpin dengan $245K, diikuti Barat $212K, Tengah $156K, dan Selatan $89K. Meski penjualan Timur tertinggi, profit margin-nya tidak sebesar Teknologi di Barat, namun volume tetap mengungguli.
            </div>
        </div>
    </div>

    <footer>
        ⚡ Dashboard Superstore – Data agregasi 2023–2024 | Visualisasi menggunakan Chart.js | Narasi berdasarkan insight bisnis
    </footer>
</div>

<script>
    // ---------- GRAFIK 1: PENJUALAN PER KATEGORI ----------
    const ctxSales = document.getElementById('salesCategoryChart').getContext('2d');
    new Chart(ctxSales, {
        type: 'bar',
        data: {
            labels: ['Teknologi', 'Perlengkapan Kantor', 'Furnitur'],
            datasets: [{
                label: 'Total Penjualan (juta USD)',
                data: [1.08, 0.97, 0.74],
                backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'],
                borderRadius: 8,
                barPercentage: 0.7,
                categoryPercentage: 0.8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: { position: 'top', labels: { font: { size: 12 } } },
                tooltip: { callbacks: { label: (ctx) => `${ctx.raw} Juta USD` } }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    title: { display: true, text: 'Penjualan (juta USD)', font: { weight: 'bold' } },
                    grid: { color: '#e2e8f0' }
                },
                x: { title: { display: true, text: 'Kategori Produk', font: { weight: 'bold' } } }
            }
        }
    });

    // ---------- GRAFIK 2: PROFIT MARGIN (%) PER KATEGORI ----------
    const ctxMargin = document.getElementById('profitMarginChart').getContext('2d');
    new Chart(ctxMargin, {
        type: 'bar',
        data: {
            labels: ['Teknologi', 'Perlengkapan Kantor', 'Furnitur'],
            datasets: [{
                label: 'Profit Margin (%)',
                data: [21.5, 14.7, 9.3],
                backgroundColor: ['#8b5cf6', '#14b8a6', '#f97316'],
                borderRadius: 8,
                barPercentage: 0.7
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: { position: 'top' },
                tooltip: { callbacks: { label: (ctx) => `${ctx.raw}%` } }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 28,
                    title: { display: true, text: 'Margin (%)', font: { weight: 'bold' } },
                    ticks: { callback: (val) => val + '%' }
                },
                x: { title: { display: true, text: 'Kategori' } }
            }
        }
    });

    // ---------- GRAFIK 3: DISTRIBUSI PENJUALAN PER WILAYAH (PIE) ----------
    const ctxRegionPie = document.getElementById('regionSalesChart').getContext('2d');
    new Chart(ctxRegionPie, {
        type: 'pie',
        data: {
            labels: ['Timur', 'Barat', 'Tengah', 'Selatan'],
            datasets: [{
                data: [34, 29, 23, 14],
                backgroundColor: ['#3b82f6', '#f97316', '#10b981', '#8b5cf6'],
                borderWidth: 0,
                hoverOffset: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: { position: 'right', labels: { font: { size: 12 } } },
                tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw}% dari total penjualan` } }
            }
        }
    });

    // ---------- GRAFIK 4: TOTAL PROFIT PER WILAYAH (BAR) ----------
    const ctxRegionProfit = document.getElementById('regionProfitChart').getContext('2d');
    new Chart(ctxRegionProfit, {
        type: 'bar',
        data: {
            labels: ['Timur', 'Barat', 'Tengah', 'Selatan'],
            datasets: [{
                label: 'Profit (ribu USD)',
                data: [245, 212, 156, 89],
                backgroundColor: '#1e293b',
                borderRadius: 8,
                barPercentage: 0.65
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: { position: 'top' },
                tooltip: { callbacks: { label: (ctx) => `${ctx.raw} Ribu USD` } }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    title: { display: true, text: 'Profit (ribu USD)', font: { weight: 'bold' } },
                    grid: { color: '#e2e8f0' }
                },
                x: { title: { display: true, text: 'Wilayah', font: { weight: 'bold' } } }
            }
        }
    });
</script>
</body>
</html>
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
